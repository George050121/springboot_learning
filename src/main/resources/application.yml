# application.yml
server:
  port: 9090

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/coffee_shop?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver


mybatis-plus:
  type-aliases-package: com.example.demo.entity
  configuration:
    map-underscore-to-camel-case: true
 

coffee:
  special-offer: "周一拿铁半价"
  shop-name: "Spring Boot咖啡屋"


# 添加 Actuator 配置
# 注意：management 必须顶格写，与上面的 server/spring 对齐
management:
  endpoints:
    web:
      exposure:
        include: "*"   # 暴露所有端点，方便调试查看
  endpoint:
    health:
      show-details: always # 显示详细的健康检查信息（如数据库连接状态）
